services:
  app:
    build: .
    container_name: hipop-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DB_URL: ${DB_URL:-postgresql://hipop:hipop_dev_password@postgres:5432/hipop}
      LLM_PROVIDER: ${LLM_PROVIDER:-qwen}
      QWEN_API_KEY: ${QWEN_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      FEISHU_APP_ID: ${FEISHU_APP_ID}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET}
      FEISHU_WEBHOOK: ${FEISHU_WEBHOOK}
    ports:
      - "8765:8765"
    volumes:
      - ./inbox:/app/inbox
      - ./logs:/app/logs

  postgres:
    image: postgres:16-alpine
    container_name: hipop-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: hipop
      POSTGRES_USER: hipop
      POSTGRES_PASSWORD: hipop_dev_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - hipop_pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hipop -d hipop"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hipop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - hipop_redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

volumes:
  hipop_pg_data:
  hipop_redis_data:
