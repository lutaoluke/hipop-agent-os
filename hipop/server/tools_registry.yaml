# Tool Registry — WS-162 single source of truth for chat tool metadata.
# governance_actions.yaml keeps execution details only; risk/access live here.
version: 1
tools:
  query_sku:
    description: 查 SKU 的健康情况（趋势、利润率、库存可撑天数、在途、告警）。最多 3 个 SKU。
    input_schema:
      type: object
      properties:
        skus:
          type: array
          items:
            type: string
          description: SKU 列表，如 ['TBJ0057A']
        store:
          type: string
          description: 店铺代号 KSA 或 UAE
          enum:
          - KSA
          - UAE
      required:
      - skus
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_query_sku
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  query_order:
    description: 查货单（如 PDZ0027158）的告警 + 涉及 SKU + 当前处理状态
    input_schema:
      type: object
      properties:
        order_no:
          type: string
      required:
      - order_no
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_query_order
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  update_alert_status:
    description: 反馈某货单告警的处理结果，例如 PDxxx 已确认丢货 / 已约仓 / 已结案。会真写入 wf6_logistics_alerts。
    input_schema:
      type: object
      properties:
        order_no:
          type: string
        status:
          type: string
          enum:
          - 已确认推进
          - 已确认丢货
          - 已约仓
          - 已结案
          - 处理中
          - 延迟
        note:
          type: string
          description: 运营备注，可选
      required:
      - order_no
      - status
    access: write
    risk_level: high
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_update_alert_status
    smoke:
    - tests/smoke_governance.py::test_destructive_tool_goes_through_governance_pipeline
  scope_overview:
    description: 店铺概览：在售 SKU 数 / 急速下降数 / 在途总量 / 红色告警数。
    input_schema:
      type: object
      properties:
        store:
          type: string
          enum:
          - KSA
          - UAE
      required:
      - store
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_scope_overview
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  compute_replenishment:
    description: 列出当前店铺的补货建议（来自 wf5_sales_cycle 的 weekly_total_replenish > 0 的 SKU）。
    input_schema:
      type: object
      properties:
        store:
          type: string
          enum:
          - KSA
          - UAE
        limit:
          type: integer
          default: 10
      required:
      - store
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_compute_replenishment
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  query_replenishment_sku:
    description: 查单个 SKU 的本周补货建议与可追溯证据。用于用户问某 SKU 的补货建议、pipeline、风险标签、紧急度。若缓存/聚合证据缺失、全 0、过期或与上架状态矛盾，必须使用实时/权威源；实时源失败时返回 blocked，不得把缓存
      0 当作结论。
    input_schema:
      type: object
      properties:
        sku:
          type: string
          description: SKU 码，如 TBU0010A
        store:
          type: string
          enum:
          - KSA
          - UAE
          default: KSA
      required:
      - sku
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_query_replenishment_sku
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  compute_air_freight_roi:
    description: 估算单个 SKU 海运 vs 空运的 ROI 决策。假设：海运 0.4 USD/件、空运 2.5 USD/件、海运 25 天、空运 5 天。结合 SKU 销量 + 利润率，估算损失订单数 + 净 ROI 差。
    input_schema:
      type: object
      properties:
        sku:
          type: string
        store:
          type: string
          enum:
          - KSA
          - UAE
        qty:
          type: integer
          description: 本次发运件数
          default: 100
      required:
      - sku
      - store
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_compute_air_freight_roi
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  data_health_check:
    description: 返回各数据表（wf2 / wf5 / wf3 / wf6 / feishu_digest）的最新写入时间，告诉用户数据是不是新鲜。
    input_schema:
      type: object
      properties:
        store:
          type: string
          enum:
          - KSA
          - UAE
      required:
      - store
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_data_health_check
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  list_products:
    description: 列出店铺商品。返回两个维度的统计：summary_products（product 维度，与 ERP 后台数字一致）+ summary_skus（SKU 维度，含变体）。用户问『商品/产品总数』时优先报 summary_products.total（这是
      ERP 后台筛店铺看到的数字）。用户问『SKU 总数』或『变体』时报 summary_skus.total。**仅当**用户问『无时间窗的裸销量排行』(如『销量最高的3个商品』『最畅销的SKU』，句中不含任何时间窗)时才用本工具并设
      limit=N，items 按 wf2_sku.sales_30d 固定桶排序。**凡句中带任何时间窗**——『近N天/最近N天/过去N天/这N天/近三十天/近30日』或显式起止日期（如 2026-05-07 到 2026-06-05）——一律改用
      top_sales_by_window（按 wf2_orders 逐单现算 + 最新订单业务日倒推），**不要**用本工具的 sales_30d 固定桶冒充任意时间窗。is_listed=1 = 已绑定 noon 平台 SKU id（在线上能搜到/可下单）；is_listed=0
      = 草稿/未挂平台。listing='listed'/'unlisted'/'all' 控制示例返回；sales_only=true 仅含 sales_180d>0；limit=0 时不返示例。
    input_schema:
      type: object
      properties:
        store:
          type: string
          enum:
          - KSA
          - UAE
        listing:
          type: string
          enum:
          - all
          - listed
          - unlisted
          default: all
        sales_only:
          type: boolean
          default: false
          description: true=仅含 180 天内有销量
        limit:
          type: integer
          default: 0
          description: 返回示例 SKU 行数；0=只要聚合。问**无时间窗**的裸销量排行时传 N，items 即按 sales_30d 固定桶 DESC 的 TopN；带时间窗的排行改用 top_sales_by_window。
      required:
      - store
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_list_products
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  top_sales_by_window:
    description: |
      指定日期窗口销量 TopN：从 wf2_orders 按 order_date 逐单现算（COUNT，is_cancelled=0），不是
      wf2_sku.sales_30d 固定桶。用户问『某段时间/具体起止日期/近N天 的销量最高 N 个 SKU』时必须调本工具
      （如『2026-05-07 到 2026-06-05 销量最高 3 个』『最近30天销量前10』）。start_date/end_date 用
      YYYY-MM-DD；relative_days 传 N 表示『近N天』（按最新订单业务日倒推，且最新订单距今 >3 天则拒答）。
      窗口任一端未被订单数据覆盖时返 available=false + reason，按缺数明确告知，禁止补数或返回排名。
      items 已按 window_sales DESC 排好，不要由模型自排或补数字。
    input_schema:
      type: object
      properties:
        store:
          type: string
          enum:
          - KSA
          - UAE
        start_date:
          type: string
          description: 窗口起始业务日 YYYY-MM-DD（与 end_date 成对；relative_days 模式可省）
        end_date:
          type: string
          description: 窗口结束业务日 YYYY-MM-DD（含）
        relative_days:
          type: integer
          description: 『近N天』相对窗口；给定则忽略 start/end，按最新订单业务日倒推 N 天
        limit:
          type: integer
          default: 10
          description: 返回 TopN 行数
        listing:
          type: string
          enum:
          - all
          - listed
          - unlisted
          default: all
      required:
      - store
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_top_sales_by_window
    smoke:
    - tests/smoke_ws120_window_sales_topn.py
  export_table:
    description: "用户要求『导出/下载/给我表格/打成表格/Excel』时调本工具。**真生成 xlsx 文件** 到 ~/hipop/exports/，返 {download_url, row_count, filename}。返完后用\
      \ markdown 链接 `[文件名](download_url)` 给用户。\n**禁** 自己编『下载链接』；**禁** 说『系统只能返 X 个示例』(filtered_count 才是真总数，items 由 limit 控制)。\n\
      常用 view：\n  - `unlisted_with_sales` 未上架但 180d 有销量 SKU（Luke 高频）\n  - `sales` wf2_sku 销量全字段（配 listing/sales_only 细化）\n\
      \  - `sku_health` 销量+库存+在途跨表\n  - `replenish` wf5_sales_cycle 补货建议\n  - `logistics` wf3 卡单告警"
    input_schema:
      type: object
      properties:
        view:
          type: string
          enum:
          - unlisted_with_sales
          - sales
          - sku_health
          - replenish
          - logistics
        store:
          type: string
          enum:
          - KSA
          - UAE
          default: KSA
        listing:
          type: string
          enum:
          - all
          - listed
          - unlisted
          default: all
          description: 用于 sales/sku_health view
        sales_only:
          type: boolean
          default: false
          description: 用于 sales/sku_health view — 只要 180d 有销量
        format:
          type: string
          enum:
          - excel
          default: excel
        filter_desc:
          type: string
          description: 用户筛选条件描述（写到文件名/响应里）
      required:
      - view
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_export_table
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  navigate_user_to:
    description: '用户要求『打开 X 页面/进 X 模块/看 X 看板』时调本工具，返回**真实**的工作台模块路径。

      严禁编造 URL（如 agent.diangou.ai 这种虚构域名）；模块路径只能是 localhost:8765/module/<name>。'
    input_schema:
      type: object
      properties:
        module:
          type: string
          enum:
          - overview
          - sales
          - logistics
          - replenish
          - selection
          - feishu
          - audit
          - role_liuhe
        store:
          type: string
          enum:
          - KSA
          - UAE
      required:
      - module
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_navigate_user_to
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  notify_via_feishu:
    description: '用户说『发到飞书 / 通知刘鹤 / 推到群里 / @同事』时调本工具。

      本系统飞书推送当前为只读集成（拉取告警/补货决策同步），**不能主动发消息**。

      严禁不调本 tool 直接说『已发到飞书』。'
    input_schema:
      type: object
      properties:
        channel:
          type: string
          description: 飞书群 / 个人 / @某同事
        message_summary:
          type: string
      required:
      - message_summary
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_notify_via_feishu
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  run_workflow:
    description: '异步触发后台工作流（耗时操作，立即返回 task_id 让前端订 SSE 进度）。

      **只可选以下 v2 workflow（per-tenant，会用 onboarding 存的加密 ERP 凭据 headless 登录拉数）**：

      - refresh_all_v2：全量刷新（商品→销量→库存→销售周期→物流→告警），用户说『拉/同步/刷』全部数据时优先用

      - wf2_products_v2：只拉 ERP 商品库（写 wf2_sku）

      - wf2_sales_v2：拉商品库 + 销量价格 6 时间窗（写 wf2_sku）

      - wf2_sales_refresh_v2：用现有 noon 订单重算窗口销量 + 评级/预测（不拉新 CSV/ERP，秒级）；用户说『刷新销量 / 重算销量 / 重新评级』时选它

      - wf1_stock_v2：拉 ERP 6 仓库存（写 wf1_stock）

      - wf5_sales_cycle_v2：基于现有 wf2/wf1/wf3 数据重算销售周期 + 补货决策

      - wf3_logistics_v2：从 ERP 拉物流货单 + 抓物流站节点（默认只扫近 60 天有销量的 SKU，~30 分钟；用户问『扫物流』走这个）

      - wf6_alerts_v2：物流告警生成（依赖 wf3 真数据；wf3 跑完再调）

      - wf4_replenish_suggest：补货建议（三类静态数据 → 每 SKU 补货量表，WS-7）；用户问『该补多少 / 算补货量 / 出补货清单』时选它

      用户说『拉/同步/刷新/重算/跑』数据时调本工具。**除上面列出的之外严禁选其它 workflow，老 workflow 只读全局 env，会让多租户用户必崩**。

      **重要**：如果用户原始问题需要等数据跑完才能答（如『我该补货吗』而 wf5 陈旧），在 followup_prompt 填上『需要等工作流跑完后接续答的问题』，前端会在 task 完成后自动重发一轮 chat，你那时再用最新数据答最终结论。'
    input_schema:
      type: object
      properties:
        workflow:
          type: string
          enum:
          - refresh_all_v2
          - wf2_products_v2
          - wf2_sales_v2
          - wf2_sales_refresh_v2
          - wf1_stock_v2
          - wf5_sales_cycle_v2
          - wf3_logistics_v2
          - wf6_alerts_v2
          - wf4_replenish_suggest
        followup_prompt:
          type: string
          description: 工作流跑完后前端会自动作为新一轮 user 消息重发。一般填用户的原始问题（如『我该补货吗』）。不需要等的纯触发场景留空。
      required:
      - workflow
    access: write
    risk_level: medium
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_run_workflow
    smoke:
    - tests/smoke_governance.py::test_governance_registry_has_destructive_tools
    - tests/smoke_governance.py::test_medium_risk_decide_allows_without_api_key
  query_sku_live:
    description: '**实时**查单个 SKU 的 ERP 在途货单 + 物流公司 + tracking 号（不读 wf3_hub_v2 缓存，直连 ERP）。默认快版（只 ERP，5-15s）。with_nodes=True
      时**额外用 playwright 抓物流站节点**（义特无忧/安时达/阳光/飞坦 4 家），多花 5-10s 每单，但能告诉用户''卡在哪个节点''。**触发 with_nodes=True 的关键词**：节点 / 卡哪 / 物流轨迹
      / 走到哪了 / 详细物流状态。'
    input_schema:
      type: object
      properties:
        sku:
          type: string
          description: SKU 码，如 TBC0168A
        with_nodes:
          type: boolean
          default: false
          description: 是否抓物流站节点（慢但准）
      required:
      - sku
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_query_sku_live
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  query_order_live:
    description: '**实时**查单个货单的 ERP 当前状态 + 物流公司 + tracking 号 + 物流站直链。适用：用户问 ''PDxxx 现在到哪了'' / ''PDxxx 物流卡几天'' / ''PDxxx 实时状态''。比
      query_order 慢（实时拉），但 ERP 状态最新（hipop wf3 缓存可能 N 天前）。返回 forwarder + tracking_no + 物流站 URL（让用户/Agent 点过去看节点）。'
    input_schema:
      type: object
      properties:
        order_no:
          type: string
          description: 货单号 PDxxx
      required:
      - order_no
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_query_order_live
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  tenant_notes_get:
    description: 读 tenant 跨 session 沉淀的 NOTES.md（客户偏好 / 业务规则 / 学到的经验）。适用：用户问'我的偏好' / '上次我说的 X' / Agent 准备做高风险决策前查 context。section
      可选；不给返全文。
    input_schema:
      type: object
      properties:
        section:
          type: string
          description: '可选，只返指定 # 标题段（如''补货偏好''/''选品方向''）'
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: _tool_tenant_notes_get
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  tenant_notes_append:
    description: 把用户明确表达的偏好/规则/经验追加到 NOTES.md 跨 session 沉淀。**只在用户明确说'以后都这么办' / '记住' / '默认' 等持久化语义时调**，不要把每条聊天都写进 NOTES（NOTES.md
      要短而高信号，按 Anthropic 哲学）。
    input_schema:
      type: object
      properties:
        note:
          type: string
          description: 要沉淀的一句话规则/偏好
        section:
          type: string
          default: 通用
          description: '归入哪个 # 标题（补货偏好/选品方向/物流规则/通用 等）'
      required:
      - note
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: _tool_tenant_notes_append
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  confirm_proposal:
    description: '用户已确认 / 取消之前 destructive 行动的 Plan。

      **触发时机**：上一轮你给用户返了 plan_text（action_type=''plan''），用户回复 ''OK / 是 / 确认'' 或 ''取消 / 不要 / no''，本轮必须调本工具推进。

      **绝不要**自己再次调原 destructive tool（governance pipeline 会拒）。'
    input_schema:
      type: object
      properties:
        proposal_id:
          type: string
          description: 上一轮 plan 返回的 proposal_id
        user_decision:
          type: string
          enum:
          - ok
          - cancel
          description: 用户的最终决定
      required:
      - proposal_id
      - user_decision
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: _tool_confirm_proposal
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  query_1688_similar:
    description: '拿一张 noon/amazon 商品图片 URL, 走 1688 主站图搜找同款 + 比价. 用户场景: 粘一张 noon URL 或图片 URL 说『找同款』『1688 有这个吗』『找货源』. 返回 top
      5 候选: offer_id / 标题 / 价格 / 店铺 / cosScore / verdict (inquiry|differentiation|watch|drop) / 跳转 URL. verdict=inquiry 即可直接询盘;
      differentiation 进 N8 差异化挖掘; failed=True 时给文搜兜底关键词.'
    input_schema:
      type: object
      properties:
        image_url:
          type: string
          description: 公网可达商品图 URL (noon CDN / amazon CDN / 1688 CDN)
        pack:
          type: integer
          default: 1
          description: '件套数: 1=单只 / 2-6=多件套. 多件套自动关 yoloCrop 提升 set 组识别'
        material:
          type: string
          description: query 材质 (ABS/PC/PP/铝框/软箱/皮箱/未知), 用于跨材质降权
        title:
          type: string
          description: query 标题, 仅记录用
      required:
      - image_url
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_query_1688_similar
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  capture_feedback:
    description: '用户撞到你做不了 / 超出当前能力范围的事，且用户**确认要记成需求**时调本工具，**真写入 feedback 表**（产品迭代会读这张表，需求不再石沉大海）。

      触发时机：上一轮你回过『这个我做不了 / 超出范围』并 offer 了『要我记成需求吗』，用户回『记一下 / 好 / 帮我记 / 提个需求』——本轮必须调本工具。

      **严禁**不调本 tool 就说『已记下 / 已反馈给产品』——没写库 = 没记。

      写失败工具会返 ok=False + error，此时如实告诉用户『没记成，等会儿再说一次』，**绝不许假装记了**（报告即事实）。content 尽量保留用户原话。'
    input_schema:
      type: object
      properties:
        content:
          type: string
          description: 用户的需求原话 / 诉求，尽量保留原文
        scene:
          type: string
          description: 触发场景，如『想把销量导成 PDF 月报』『问能不能改商品价』
        category:
          type: string
          enum:
          - 需求
          - bug
          - 数据问题
          - 其他
          default: 需求
      required:
      - content
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_capture_feedback
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  explain_status_enum:
    description: 用户问『5 个状态哪里来的 / 能加 X 状态吗 / 状态定义在哪 / 这是 ERP 内置还是 hipop 自己的字段』时调本工具。返回字段出处、当前枚举值、是否可扩展、扩展方法。不要凭空说『状态写死在系统里』；必须真调本
      tool 拿到 source 引用。
    input_schema:
      type: object
      properties:
        field:
          type: string
          enum:
          - alert_status
          default: alert_status
          description: 目前只支持 alert_status (告警 ops_status)
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_explain_status_enum
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  query_stock_split:
    description: 查单 SKU 四仓库存拆分 + 总量 + 来源时间戳。四仓：义乌(yiwu) / 沙特一号仓(overseas_saudi_1) / noon仓 / 在途(inbound)。数据超过 3 天 fail-closed
      不出数；≤3天带警告提示用户确认。触发词：库存拆分 / 四仓 / 总库存 / yiwu / saudi / 义乌仓 / 沙特仓 / noon仓库存 / 仓库明细 / 各仓 / <SKU>库存多少。单 SKU 询问（必须有 SKU 代码），不含
      TopN 排行。
    input_schema:
      type: object
      properties:
        sku:
          type: string
          description: SKU 代码，如 TBP0169A
        store:
          type: string
          enum:
          - KSA
          - UAE
          default: KSA
      required:
      - sku
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_query_stock_split
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
  total_stock_topn:
    description: 查 KSA/UAE 当前总库存（total_stock）最高的前 N 个 SKU。total_stock = 官方仓(noon) + 海外仓 + 国内仓(义乌+东莞) + 送仓未上架(pending_inbound)，口径含
      pending_inbound，与 noon 可售(saleable) 不同。数据陈旧（>3天）时 fail-closed 不出数。触发词：总库存最高 / 库存最多的 SKU / 积压最多 / 库存 TopN / 当前库存量排行。
    input_schema:
      type: object
      properties:
        store:
          type: string
          enum:
          - KSA
          - UAE
          default: KSA
        n:
          type: integer
          default: 10
          description: 返回前 N 个 SKU，默认 10
      required: []
    access: read
    risk_level: low
    required_role:
    - owner
    - manager
    - ops
    - forwarder
    data_scope: tenant
    impl: tool_total_stock_topn
    smoke:
    - tests/smoke_governance.py::test_tools_registry_manifest_is_single_source_of_truth
