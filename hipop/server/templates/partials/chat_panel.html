<div class="pc-chat" x-data="chatPanel()" x-init="init()">
  <div class="pc-chat-header">
    <div style="font-weight:600;">店铺协作 · Agent <span style="color:var(--text-tertiary);font-weight:400;">· {{ store_full or 'HIPOP-NOON-KSA' }}</span></div>
    <div style="font-size:11px;color:var(--text-tertiary);margin-top:2px;">{{ current_user or 'Cherry' }} · 团队 + Agent</div>
    <div class="pc-chat-team">
      <template x-for="m in team" :key="m.name">
        <div class="pc-team-avatar"
             :class="{'online': m.online, 'me': m.is_me}"
             :title="m.name + ' · ' + m.role + (m.online ? ' · 在线' : ' · 离线')"
             x-text="m.avatar"></div>
      </template>
      <div class="pc-team-avatar agent online" title="Agent · 在岗">A</div>
      <button class="pc-team-invite" title="邀请同事">+</button>
      <span style="font-size:11px;color:var(--text-tertiary);margin-left:8px;" x-text="onlineCount + '/' + (team.length+1) + ' 在线'"></span>
    </div>
  </div>

  <div class="pc-chat-msgs" id="chatMsgs">
    <template x-for="(m, idx) in messages" :key="idx">
      <div class="pc-chat-msg" :class="m.role">
        <div class="pc-team-avatar"
             :class="{'agent': m.role==='agent', 'me': m.role==='user'}"
             style="flex-shrink:0;"
             x-text="m.who && m.who[0] || 'A'"></div>
        <div style="flex:1;">
          <div class="pc-chat-meta">
            <span x-text="m.who"></span>
            <span x-show="m.tag" class="pc-chat-tag" x-text="m.tag"></span>
            <span style="margin-left:6px;" x-text="m.time"></span>
          </div>
          <div class="pc-chat-bubble">
            <span x-html="formatContent(m.content)"></span>
            <template x-if="m.task">
              <div style="margin-top:6px;padding:6px 8px;background:var(--bg-tertiary);border-radius:6px;font-size:11.5px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;">
                  <span style="font-weight:600;">⚙️ <span x-text="m.task.label"></span></span>
                  <span style="color:var(--text-tertiary);" x-text="m.task.done_count + '/' + m.task.total_steps + (m.task.finished ? (m.task.ok ? ' ✓' : ' ✗') : ' …')"></span>
                </div>
                <template x-for="(s, i) in m.task.steps" :key="i">
                  <div style="font-family:ui-monospace,Menlo,monospace;font-size:10.5px;line-height:1.5;"
                       :style="s.status==='done' ? 'color:var(--text-success);' : (s.status==='started' ? 'color:var(--text-info);font-weight:600;' : (s.status==='error' ? 'color:var(--text-danger);' : 'color:var(--text-tertiary);'))">
                    <span x-text="(s.status==='done'?'✓':(s.status==='started'?'▶':(s.status==='error'?'✗':(s.status==='skipped'?'·':' '))))"></span>
                    <span x-text="' ' + s.name"></span>
                  </div>
                </template>
                <div x-show="m.task.finished && m.task.ok && m.task.affected_modules && m.task.affected_modules.length"
                     style="margin-top:4px;color:var(--text-success);font-size:10.5px;">
                  ✓ 已完成 · 已刷新页面：<span x-text="(m.task.affected_modules||[]).join(' / ')"></span>
                </div>
              </div>
            </template>
            <template x-if="m.references && m.references.length">
              <div style="margin-top:4px;">
                <template x-for="r in m.references">
                  <span style="display:inline-block;font-size:10.5px;color:var(--text-info);background:var(--bg-info);padding:1px 6px;border-radius:4px;margin-right:4px;cursor:pointer;"
                        @click="$dispatch('open-ref',{title:'数据出处',body:'',refs:m.references})"
                        x-text="'📎 ' + r.table"></span>
                </template>
              </div>
            </template>
          </div>
        </div>
      </div>
    </template>
    <div x-show="loading" style="font-size:11.5px;color:var(--text-tertiary);padding:0 6px;">Agent 思考中…</div>
  </div>

  <div class="pc-chat-input-wrap">
    <div class="pc-chat-quick">
      <template x-for="q in quickCommands">
        <button class="pc-chat-quick-btn" @click="input=q;send()" x-text="q"></button>
      </template>
    </div>
    <div class="pc-chat-input">
      <textarea x-model="input"
                @keydown.ctrl.enter="send()"
                @keydown.meta.enter="send()"
                placeholder="@ 同事 / 问 Agent / 上传 CSV…"></textarea>
      <button @click="send()" :disabled="loading">发送</button>
    </div>
  </div>
</div>

<script>
function chatPanel() {
  return {
    team: [],
    messages: [],
    quickCommands: [],
    input: "",
    loading: false,
    onlineCount: 0,
    currentUser: "{{ current_user or 'Cherry' }}",  // 登录用户名（pages.py _ctx 注入）
    async init() {
      const [team, history] = await Promise.all([
        fetch('/api/team/{{ store_lower or "ksa" }}').then(r=>r.json()),
        fetch('/api/chat-history/{{ store_lower or "ksa" }}').then(r=>r.json()),
      ]);
      this.team = team;
      this.onlineCount = team.filter(m=>m.online).length + 1;  // +1 agent
      // 标准化历史消息：DB 中的 task 仅含 metadata，标记为已完成态以便正确渲染
      this.messages = (history || []).map(m => {
        if (m.task && m.task.task_id) {
          m.task = Object.assign({
            steps: [], done_count: m.task.total_steps || 0,
            finished: true, ok: true,
          }, m.task);
        }
        return m;
      });
      this.quickCommands = ["上传 noon CSV", "查 SKU 健康", "看 KSA 卡单", "本周补货建议", "选品候选评估"];
      // 上传也走 chat 进度气泡（含 followup 自动续问）
      window.addEventListener('chat-attach-task', (e) => {
        const t = e.detail || {};
        const msg = {
          who: "Agent", role: "agent",
          time: new Date().toTimeString().slice(0,5),
          content: (t.source === "upload"
            ? `已收到上传文件，开始处理 ${t.label || '管道'}...`
            : `任务已启动: ${t.label || ''}`),
          tag: "执行", references: [], task: null,
        };
        this.messages.push(msg);
        this.attachTask(msg, t);
        this.scroll();
      });
      this.scroll();
    },
    formatContent(s) {
      // Phase 9 — markdown link [text](url) → <a>，让 chat 里下载链接可点击
      s = (s || '');
      // 先转义 HTML 特殊字符（防 agent 返回里有 <script> 之类）
      s = s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      // 解析 markdown [text](url) — url 不能含空格/引号
      s = s.replace(/\[([^\]]+)\]\(([^)\s"']+)\)/g,
        '<a href="$2" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline;">$1</a>');
      // 换行
      return s.replace(/\n/g, '<br>');
    },
    scroll() {
      this.$nextTick(() => {
        const el = document.getElementById('chatMsgs');
        if (el) el.scrollTop = el.scrollHeight;
      });
    },
    async send(opts) {
      opts = opts || {};
      const text = (this.input || "").trim();
      if (!text || this.loading) return;
      const tag = opts.autoFollowup ? "auto-续问" : "";
      this.messages.push({who: this.currentUser, role: "user", time: new Date().toTimeString().slice(0,5), content: text, tag: tag});
      this.input = "";
      this.loading = true;
      this.scroll();
      try {
        const r = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            messages: this.messages.filter(m=>m.role!=='system').map(m => ({
              role: m.role === 'agent' ? 'assistant' : 'user',
              content: m.content,
            })),
            scope: {store: "{{ store }}"},  // current_user/role 后端从 token 取，不信前端
          }),
          credentials: 'include',
        });
        const data = await r.json();
        const msg = {
          who: "Agent", role: "agent",
          time: new Date().toTimeString().slice(0,5),
          content: data.reply || "(无回复)",
          tag: data.tag || "",
          references: data.references || [],
          task: null,
        };
        this.messages.push(msg);
        if (data.workflow_task) {
          this.attachTask(msg, data.workflow_task);
        }
      } catch(e) {
        this.messages.push({who: "Agent", role: "agent", time: new Date().toTimeString().slice(0,5), content: "⚠️ 连接错误: " + e, tag: ""});
      }
      this.loading = false;
      this.scroll();
    },
    attachTask(msg, t) {
      // 初始化 inline 进度状态
      msg.task = {
        task_id: t.task_id,
        workflow: t.workflow,
        label: t.label,
        total_steps: t.total_steps,
        affected_modules: t.affected_modules || [],
        followup_prompt: t.followup_prompt || null,
        steps: [],         // [{name, status}]
        done_count: 0,
        finished: false,
        ok: false,
      };
      // 通知顶部 progress_card 也跟进
      window.dispatchEvent(new CustomEvent('task-started', {
        detail: {taskId: t.task_id, label: t.label}
      }));
      // 订阅 SSE
      const sse = new EventSource('/api/events/stream/' + t.task_id);
      sse.onmessage = (e) => {
        try {
          const ev = JSON.parse(e.data);
          if (ev.type === 'connected') return;
          if (ev.type === 'closing') { sse.close(); return; }
          this.applyEvent(msg, ev, sse);
          this.scroll();
        } catch (err) { console.error(err); }
      };
      sse.onerror = () => { sse.close(); };
    },
    applyEvent(msg, ev, sse) {
      const sn = ev.step_no, name = ev.step_name, st = ev.status;
      // step_no=0 是 init（已在 attachTask 设了 total_steps），跳过
      if (sn === 0) return;
      // step_no=99 是终结事件
      if (sn === 99) {
        msg.task.finished = true;
        msg.task.ok = (st === 'done');
        sse.close();
        if (msg.task.ok) {
          // 通知模块页刷新
          window.dispatchEvent(new CustomEvent('workflow-done', {
            detail: {
              workflow: msg.task.workflow,
              task_id: msg.task.task_id,
              affected_modules: msg.task.affected_modules,
            }
          }));
          // 自动 follow-up：把用户原始问题作为新一轮 user 消息重发，
          // Agent 此时数据已新鲜，直接给最终答案。
          if (msg.task.followup_prompt) {
            const fp = msg.task.followup_prompt;
            msg.task.followup_prompt = null;  // 防止重复触发
            setTimeout(() => {
              this.input = fp;
              this.send({autoFollowup: true});
            }, 800);
          }
        }
        return;
      }
      // 普通 step：保证 steps 数组长度 ≥ sn
      while (msg.task.steps.length < sn) {
        msg.task.steps.push({name: '步骤 ' + (msg.task.steps.length+1), status: 'pending'});
      }
      msg.task.steps[sn-1] = {name: name || ('步骤 ' + sn), status: st};
      msg.task.done_count = msg.task.steps.filter(s => s.status === 'done').length;
    },
  };
}
</script>
