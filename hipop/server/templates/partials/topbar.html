<div class="pc-topbar">
  <div class="pc-logo">
    <div class="pc-logo-mark">点</div>
    <span>点购 Agent OS</span>
  </div>

  <div class="pc-mode-chips">
    <span class="pc-chip {% if not page or page=='overview' or page in ['sales','logistics','replenish','selection','feishu'] %}active{% endif %}"
          onclick="location='/?store={{ store_lower or 'ksa' }}'">店铺</span>
    <span class="pc-chip {% if page=='liuhe' %}active{% endif %}"
          onclick="location='/role/liuhe'">职能</span>
    <span class="pc-chip">团队</span>
    <span class="pc-chip">全公司</span>
  </div>

  {% if page != 'liuhe' %}
  <select class="pc-store-select" onchange="location=this.value">
    {% for s in available_stores %}
      <option value="/?store={{ s.code|lower }}" {% if s.code == store %}selected{% endif %}>
        {{ s.name }}
      </option>
    {% endfor %}
  </select>
  {% endif %}

  <div class="pc-data-chip" id="dataChip" hx-get="/api/data-health/{{ store_lower or 'ksa' }}" hx-trigger="load" hx-swap="innerHTML">
    <span class="pc-dot info"></span>
    <span>数据 检查中...</span>
  </div>

  <div class="pc-spacer"></div>

  <div class="pc-agent-status">
    <span class="pc-dot ok"></span>
    <span>Agent · 在岗</span>
  </div>

  <button class="pc-icon-btn" title="通知">
    🔔
    <span class="pc-badge">3</span>
  </button>
  <button class="pc-icon-btn" title="设置">⚙️</button>
  <div x-data="{open: false}" style="position: relative;">
    <div class="pc-avatar" title="{{ current_user }} · {{ current_role }}{% if is_default_user %} · 未登录{% endif %}"
         @click="open = !open" style="cursor: pointer;">
      {{ current_user[0]|upper }}
    </div>
    <div x-show="open" @click.outside="open = false" x-cloak
         style="position: absolute; right: 0; top: calc(100% + 6px); background: var(--bg-primary); border: 1px solid var(--border-default); border-radius: 8px; min-width: 200px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); padding: 8px 0; z-index: 100; font-size: 13px;">
      <div style="padding: 8px 14px; border-bottom: 1px solid var(--border-default);">
        <div style="font-weight: 600;">{{ current_user }}</div>
        <div style="font-size: 11.5px; color: var(--text-tertiary);">{{ current_role }}{% if is_default_user %} · 未登录（默认账户）{% endif %}</div>
      </div>
      {% if is_default_user %}
      <a href="/login" style="display: block; padding: 8px 14px; color: var(--text-info); text-decoration: none;">登录</a>
      <a href="/register" style="display: block; padding: 8px 14px; color: var(--text-info); text-decoration: none;">注册新工作空间</a>
      {% else %}
      <a href="/onboarding" style="display: block; padding: 8px 14px; color: var(--text-primary); text-decoration: none;">⚙️ 接入向导</a>
      <button @click="logout()" style="display: block; width: 100%; text-align: left; padding: 8px 14px; background: none; border: none; color: var(--text-danger); cursor: pointer; font-size: 13px;">退出登录</button>
      {% endif %}
    </div>
  </div>
</div>
<script>
async function logout() {
  await fetch('/api/auth/logout', {method: 'POST', credentials: 'include'});
  window.location.href = '/login';
}
</script>

<script>
// 美化数据健康 chip
htmx.on('htmx:afterSwap', function(e) {
  if (e.detail.elt.id !== 'dataChip') return;
  try {
    var d = JSON.parse(e.detail.xhr.responseText);
    var html = '';
    var states = [
      ['ERP', d.erp], ['noon-sales', d.noon_sales],
      ['noon-inv', d.noon_inv], ['飞书', d.feishu]
    ];
    states.forEach(function(p) {
      html += '<span style="margin-right:6px;"><span class="pc-dot ' + p[1] + '"></span> ' + p[0] + '</span>';
    });
    html += '<span style="color:var(--text-tertiary);">| ' + (d.as_of_date || '') + '</span>';
    e.detail.elt.innerHTML = html;
  } catch(err) {
    e.detail.elt.innerHTML = '<span class="pc-dot warn"></span><span>数据状态获取失败</span>';
  }
});
</script>
